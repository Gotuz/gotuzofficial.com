<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* HEADER */

header {
    position: absolute;
    top: 30px;
    width: 100%;
    font-size: 18px;
    letter-spacing: 2px;

    display: flex;
    justify-content: center;
    gap: 40px;
    z-index: 1000;
}

header a {
    text-decoration: none;
    color: #F3EFE6;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO */

.hero {
    padding: 140px 20px 80px;
}

.hero h1 {
    font-size: 80px;
    letter-spacing: 6px;
    margin: 0;
}

.hero h2 {
    font-size: 22px;
    letter-spacing: 4px;
    margin: 10px 0;
}

.hero p {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.6;
}

/* PRE SAVE BUTTON */

.presave-btn {
    margin-top: 25px;
    display: inline-block;
    padding: 10px 22px;
    border: 1px solid #F3EFE6;
    font-size: 14px;
    letter-spacing: 2px;
    text-decoration: none;
    color: #F3EFE6;
    transition: 0.2s;
}

.presave-btn:hover {
    background: #F3EFE6;
    color: #111;
}

/* SINGLES SCROLL */

.singles-scroll {
    display: flex;
    overflow-x: auto;
    gap: 40px;
    padding: 40px 20px 100px;

    scroll-snap-type: x mandatory;
}

/* nasconde scrollbar su mobile */
.singles-scroll::-webkit-scrollbar {
    display: none;
}

/* SINGLE */

.single {
    min-width: 260px;
    scroll-snap-align: center;
}

/* POSTER */

.poster {
    width: 100%;
    border-radius: 4px;
    margin-bottom: 15px;
}

/* COVER */

.cover {
    width: 100%;
    border-radius: 4px;
    transition: 0.3s;
    cursor: pointer;
}

.cover:hover {
    transform: scale(1.05);
    opacity: 0.85;
}

/* FOOTER */

.social-footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width: 768px) {

    .hero h1 {
        font-size: 50px;
    }

    .hero h2 {
        font-size: 18px;
    }

    .single {
        min-width: 200px;
    }
}

</style>
</head>

<body>

<header>

<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>

</header>

<!-- HERO -->

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
<p>estimate date: end 2026</p>

<a href="#" class="presave-btn">PRE-SAVE</a>
</div>

<!-- SINGLES -->

<div class="singles-scroll">

<!-- YOU COULD BE -->

<div class="single">
<img src="you-could-be_poster.png" class="poster">

<a href="listen.html">
<img src="you-could-be_artcover.png" class="cover">
</a>
</div>

<!-- LONELY HEART -->

</div>
