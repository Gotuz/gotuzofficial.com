<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;

    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
}

header a {
    text-decoration: none;
    color: #F3EFE6;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* CONTAINER */

.container {
    margin-top: 140px;
    padding: 0 20px 100px;
}

/* SINGLE BLOCK */

.single {
    margin-bottom: 80px;
}

.single-title {
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 25px;
}

/* POSTER */

.poster {
    width: 420px;
    max-width: 90%;
    margin-bottom: 20px;
    border-radius: 4px;
}

/* COVER */

.cover-link {
    display: inline-block;
}

.cover {
    width: 260px;
    max-width: 80%;
    border-radius: 4px;
    transition: 0.3s;
    cursor: pointer;
}

.cover:hover {
    transform: scale(1.05);
    opacity: 0.85;
}

/* LISTEN TEXT */

.listen {
    margin-top: 10px;
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.8;
}

/* FOOTER */

.social-footer {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    margin: 15px 0 30px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width: 768px) {

    header {
        font-size: 16px;
        gap: 20px;
    }

    .poster {
        width: 300px;
    }

    .cover {
        width: 200px;
    }
}

</style>
</head>
