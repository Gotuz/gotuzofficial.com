<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* FIX LINK */
a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER ORIGINALE */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO ORIGINALE */

.hero {
    margin-top: 180px;
    margin-bottom: 80px;
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
    letter-spacing: 4px;
}

.hero p {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.6;
}

/* GOLD BUTTON ORIGINALE */

.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px 38px;
    display: inline-block;

    background: linear-gradient(145deg,#bfa24a,#e6c86a,#caa94f,#a88935);
    color: #111;
    border: 1px solid #caa94f;

    box-shadow:
        0 0 8px rgba(212,175,55,0.35),
        0 4px 10px rgba(0,0,0,0.5);

    transition: 0.3s;
}

.buttons a:hover {
    background: transparent;
    color: #d6b85a;
    border: 1px solid #8B0000;
}

/* 🎵 APPLE FLOW */

.flow-wrapper {
    perspective: 1200px;
    margin: 40px 0 120px;
    overflow: hidden;
}

.flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 40px calc(50% - 150px);
}

.flow::-webkit-scrollbar {
    display: none;
}

/* ITEM */

.flow-item {
    flex: 0 0 auto;
    width: 260px;
    transition: transform 0.4s, opacity 0.4s;
    transform-style: preserve-3d;
}

/* POSTER */

.poster {
    width: 100%;
    border-radius: 6px;
}

/* COVER */

.cover {
    width: 70%;
    margin-top: 15px;
    border-radius: 6px;
}

/* STATO */

.flow-item.center {
    transform: scale(1.2) rotateY(0deg);
    opacity: 1;
}

.flow-item.left {
    transform: scale(0.85) rotateY(25deg);
    opacity: 0.5;
}

.flow-item.right {
    transform: scale(0.85) rotateY(-25deg);
    opacity: 0.5;
}

/* FOOTER ORIGINALE */

.social-footer {
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width:768px){

    .hero h1 { font-size: 60px; }
    .hero h2 { font-size: 20px; }

    .flow-item { width: 200px; }
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<!-- HERO -->

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
<p>estimate date: end 2026</p>

<div class="buttons">
<a href="shop.html">PRE-ORDER</a>
</div>
</div>

<!-- 🎵 FLOW -->

<div class="flow-wrapper">
<div class="flow" id="flow">

<div class="flow-item">
<img src="you-could-be_poster.png" class="poster">
<img src="you-could-be_artcover.png" class="cover">
</div>

<div class="flow-item">
<img src="lonely-heart_poster.png" class="poster">
<img src="lonely-heart_artcover.png" class="cover">
</div>

</div>
</div>

<footer class="social-footer">
<a href="https://www.instagram.com/gotuzmusic"><img src="icons/instagram-bw.png"></a>
<a href="https://www.facebook.com/gotuzmusic"><img src="icons/facebook-bw.png"></a>
<a href="https://twitter.com/gotuzmusic"><img src="icons/twitter-bw.png"></a>
<a href="https://www.youtube.com/@gotuzmusic3389"><img src="icons/youtube-bw.png"></a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
<a href="privacy.html">Privacy Policy</a>
</footer>

<script>

/* FLOW LOGIC */

const flow = document.getElementById('flow');
const items = document.querySelectorAll('.flow-item');

function updateFlow() {
    const center = flow.scrollLeft + flow.offsetWidth / 2;

    items.forEach(item => {
        const itemCenter = item.offsetLeft + item.offsetWidth / 2;
        const dist = itemCenter - center;

        item.classList.remove('left','right','center');

        if (Math.abs(dist) < 100) {
            item.classList.add('center');
        } else if (dist < 0) {
            item.classList.add('left');
        } else {
            item.classList.add('right');
        }
    });
}

flow.addEventListener('scroll', updateFlow);
window.addEventListener('load', updateFlow);

</script>

</body>
</html>
