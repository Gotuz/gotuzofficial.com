<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;

    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
}

header a {
    text-decoration: none;
    color: #F3EFE6;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO */

.hero {
    margin-top: 140px;
    margin-bottom: 80px;
}

.hero h1 {
    font-size: 90px;
    letter-spacing: 6px;
    margin: 0;
}

.hero h2 {
    font-size: 26px;
    letter-spacing: 4px;
    margin-top: 10px;
}

/* SINGLES */

.singles {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 120px;
    padding-bottom: 120px;
}

/* SINGLE BLOCK */

.single {
    position: relative;
}

/* POSTER */

.poster {
    width: 420px;
    max-width: 90vw;
    border-radius: 4px;
}

/* COVER OVERLAY */

.cover-link {
    position: absolute;
    bottom: -40px;
    right: -40px;
}

.cover {
    width: 200px;
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    transition: 0.3s;
    cursor: pointer;
}

.cover:hover {
    transform: scale(1.08);
    opacity: 0.9;
}

/* FOOTER */

.social-footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width: 768px) {

    .hero h1 {
        font-size: 60px;
    }

    .hero h2 {
        font-size: 18px;
    }

    .poster {
        width: 300px;
    }

    .cover {
        width: 150px;
    }

    .cover-link {
        bottom: -30px;
        right: -20px;
    }
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
</div>

<div class="singles">

<!-- YOU COULD BE -->

<div class="single">

<img src="you-could-be_poster.png" class="poster">

<a href="listen.html" class="cover-link">
<img src="you-could-be_artcover.png" class="cover">
</a>

</div>


<!-- LONELY HEART -->

<div class="single">

<img src="lonely-heart_poster.png" class="poster">

<a href="listen.html" class="cover-link">
<img src="lonely-heart_artcover.png" class="cover">
</a>

</div>

</div>

<footer class="social-footer">
<a href="https://www.instagram.com/gotuzmusic" target="_blank">
<img src="icons/instagram-bw.png">
</a>
<a href="https://www.facebook.com/gotuzmusic" target="_blank">
<img src="icons/facebook-bw.png">
</a>
<a href="https://twitter.com/gotuzmusic" target="_blank">
<img src="icons/twitter-bw.png">
</a>
<a href="https://www.youtube.com/@gotuzmusic3389" target="_blank">
<img src="icons/youtube-bw.png">
</a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
<a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
