<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

/* HERO */

.hero {
    margin-top: 180px;
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
}

.hero p {
    font-size: 14px;
    opacity: 0.6;
}

/* BUTTON */

.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    padding: 14px 38px;
    background: linear-gradient(145deg,#bfa24a,#e6c86a,#caa94f,#a88935);
    color: #111;
}

/* 🎯 REAL REVOLVER */

.carousel-container {
    margin-top: 60px;
    perspective: 1200px;
}

.carousel {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 60px calc(50% - 180px);
}

.carousel::-webkit-scrollbar {
    display: none;
}

.item {
    flex: 0 0 auto;
    width: 320px;
    margin: 0 20px;
    transition: all 0.4s ease;
}

/* DEFAULT (lati) */
.item {
    transform: scale(0.75);
    opacity: 0.4;
}

/* CENTRO */
.item.active {
    transform: scale(1);
    opacity: 1;
}

/* sinistra */
.item.left {
    transform: scale(0.8) rotateY(20deg);
}

/* destra */
.item.right {
    transform: scale(0.8) rotateY(-20deg);
}

/* IMMAGINI */

.poster {
    width: 100%;
    border-radius: 6px;
}

.cover {
    width: 70%;
    margin-top: 15px;
    border-radius: 6px;
}

/* FOOTER */

.social-footer {
    margin: 40px 0 10px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    opacity: 0.7;
}

.legal-footer {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 30px;
}

/* MOBILE */

@media (max-width:768px){
    .hero h1 { font-size: 60px; }
    .item { width: 240px; }
    .carousel { padding: 40px calc(50% - 120px); }
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
<p>estimate date: end 2026</p>

<div class="buttons">
<a href="shop.html">PRE-ORDER</a>
</div>
</div>

<!-- 🎵 REVOLVER -->

<div class="carousel-container">
<div class="carousel" id="carousel">

<div class="item">
<img src="you-could-be_poster.png" class="poster">
<img src="you-could-be_artcover.png" class="cover">
</div>

<div class="item">
<img src="lonely-heart_poster.png" class="poster">
<img src="lonely-heart_artcover.png" class="cover">
</div>

<div class="item">
<img src="you-could-be_poster.png" class="poster">
<img src="you-could-be_artcover.png" class="cover">
</div>

</div>
</div>

<footer class="social-footer">
<a href="#"><img src="icons/instagram-bw.png"></a>
<a href="#"><img src="icons/facebook-bw.png"></a>
<a href="#"><img src="icons/twitter-bw.png"></a>
<a href="#"><img src="icons/youtube-bw.png"></a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ | <a href="privacy.html">Privacy Policy</a>
</footer>

<script>

const carousel = document.getElementById('carousel');
const items = document.querySelectorAll('.item');

function updateCarousel() {
    const center = carousel.scrollLeft + carousel.offsetWidth / 2;

    items.forEach(item => {
        const itemCenter = item.offsetLeft + item.offsetWidth / 2;
        const dist = itemCenter - center;

        item.classList.remove('active','left','right');

        if (Math.abs(dist) < 100) {
            item.classList.add('active');
        } else if (dist < 0) {
            item.classList.add('left');
        } else {
            item.classList.add('right');
        }
    });
}

/* set iniziale su Lonely Heart (secondo elemento) */
window.addEventListener('load', () => {
    const second = items[1];
    carousel.scrollLeft = second.offsetLeft - (carousel.offsetWidth/2) + (second.offsetWidth/2);
    updateCarousel();
});

carousel.addEventListener('scroll', updateCarousel);

</script>

</body>
</html>
