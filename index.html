<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    overflow-x: hidden;
    animation: pageFade 1.2s ease;
}

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER ORIGINALE */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    padding-top: 10px;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO ORIGINALE */

.hero {
    margin-top: 180px;
    margin-bottom: 70px;
    animation: heroFade 1.8s ease;
}

@keyframes heroFade {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
    text-rendering: optimizeLegibility;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
    letter-spacing: 4px;
}

.hero p {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin: 6px 0 22px;
}

/* GOLD BUTTON ORIGINALE */

.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px 38px;
    text-decoration: none;
    display: inline-block;
    position: relative;
    overflow: hidden;

    background: linear-gradient(
        145deg,
        #bfa24a,
        #e6c86a,
        #caa94f,
        #a88935
    );

    color: #111;
    border: 1px solid #caa94f;
    border-radius: 2px;

    box-shadow:
        0 0 8px rgba(212,175,55,0.35),
        0 4px 10px rgba(0,0,0,0.5);

    transition: all 0.35s ease;
}

.buttons a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    animation: shimmer 4.5s infinite;
}

@keyframes shimmer {
    0% { left: -120%; }
    100% { left: 140%; }
}

.buttons a:hover {
    background: transparent;
    color: #d6b85a;
    border: 1px solid #8B0000;
    box-shadow:
        0 0 12px rgba(139,0,0,0.35),
        0 6px 14px rgba(0,0,0,0.6);
    transform: translateY(-1px);
}

/* REVOLVER */

.revolver-section {
    position: relative;
    width: 100%;
    padding: 10px 0 110px;
}

.revolver-stage {
    position: relative;
    width: 100%;
    height: 560px;
    overflow: hidden;
}

.revolver-item {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transition:
        transform 0.45s ease,
        opacity 0.45s ease,
        filter 0.45s ease;
    will-change: transform, opacity;
    user-select: none;
    cursor: pointer;
}

.revolver-item img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.45);
}

.revolver-item.cover {
    width: 360px;
    z-index: 5;
}

.revolver-item.poster {
    width: 270px;
    z-index: 4;
}

.revolver-item.center-active {
    cursor: pointer;
}

.revolver-item.center-active:hover img {
    transform: scale(1.015);
}

/* CONTROLS */

.revolver-controls {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 22px;
    align-items: center;
}

.revolver-btn {
    background: transparent;
    border: 1px solid rgba(243,239,230,0.45);
    color: #F3EFE6;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s;
}

.revolver-btn:hover {
    border-color: #F3EFE6;
    transform: scale(1.05);
}

.revolver-hint {
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.5;
}

/* FOOTERS ORIGINALI */

.social-footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    margin-bottom: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    width: 100%;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width: 768px) {
    header {
        font-size: 16px;
        gap: 20px;
        padding-top: 30px;
    }

    .hero {
        margin-top: 150px;
        margin-bottom: 40px;
    }

    .hero h1 {
        font-size: 60px;
    }

    .hero h2 {
        font-size: 20px;
    }

    .revolver-stage {
        height: 420px;
    }

    .revolver-item.cover {
        width: 250px;
    }

    .revolver-item.poster {
        width: 185px;
    }
}

@media (max-width: 480px) {
    .hero h1 {
        font-size: 48px;
    }

    .hero h2 {
        font-size: 18px;
    }

    .buttons a {
        font-size: 16px;
        padding: 12px 28px;
    }

    .revolver-stage {
        height: 370px;
    }

    .revolver-item.cover {
        width: 220px;
    }

    .revolver-item.poster {
        width: 160px;
    }
}
</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="hero">
    <h1>GOTUZ</h1>
    <h2>SECOND ALBUM</h2>
    <p>estimate date: end 2026</p>

    <div class="buttons">
        <a href="shop.html">PRE-ORDER</a>
    </div>
</div>

<section class="revolver-section">
    <div class="revolver-stage" id="revolverStage">

        <!-- ordine circolare:
             0 = you-could-be_artcover
             1 = you-could-be_poster
             2 = lonely-heart_artcover  (centro iniziale)
             3 = lonely-heart_poster
        -->

        <div class="revolver-item cover" data-type="cover" data-link="listen.html">
            <img src="you-could-be_artcover.png" alt="You Could Be cover art">
        </div>

        <div class="revolver-item poster" data-type="poster">
            <img src="you-could-be_poster.png" alt="You Could Be poster">
        </div>

        <div class="revolver-item cover" data-type="cover" data-link="listen.html">
            <img src="lonely-heart_artcover.png" alt="Lonely Heart cover art">
        </div>

        <div class="revolver-item poster" data-type="poster">
            <img src="lonely-heart_poster.png" alt="Lonely Heart poster">
        </div>

    </div>

    <div class="revolver-controls">
        <button class="revolver-btn" id="prevBtn" aria-label="Previous">‹</button>
        <div class="revolver-hint">BROWSE RELEASES</div>
        <button class="revolver-btn" id="nextBtn" aria-label="Next">›</button>
    </div>
</section>

<footer class="social-footer">
<a href="https://www.instagram.com/gotuzmusic" target="_blank">
<img src="icons/instagram-bw.png" alt="Instagram">
</a>
<a href="https://www.facebook.com/gotuzmusic" target="_blank">
<img src="icons/facebook-bw.png" alt="Facebook">
</a>
<a href="https://twitter.com/gotuzmusic" target="_blank">
<img src="icons/twitter-bw.png" alt="Twitter/X">
</a>
<a href="https://www.youtube.com/@gotuzmusic3389" target="_blank">
<img src="icons/youtube-bw.png" alt="YouTube">
</a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
<a href="privacy.html">Privacy Policy</a>
</footer>

<script>
const items = Array.from(document.querySelectorAll('.revolver-item'));
const stage = document.getElementById('revolverStage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

/* centro iniziale = lonely-heart_artcover.png, indice 2 */
let activeIndex = 2;

function mod(n, m) {
    return ((n % m) + m) % m;
}

function updateRevolver() {
    const isMobile = window.innerWidth <= 480;
    const isTablet = window.innerWidth <= 768;

    const centerY = -50;

    let nearOffset = 255;
    let farOffset = 430;
    let nearScale = 0.82;
    let farScale = 0.64;
    let nearRotate = 20;
    let farRotate = 32;
    let centerScale = 1.12;

    if (isTablet) {
        nearOffset = 185;
        farOffset = 310;
        nearScale = 0.76;
        farScale = 0.56;
        nearRotate = 16;
        farRotate = 24;
        centerScale = 1.08;
    }

    if (isMobile) {
        nearOffset = 150;
        farOffset = 245;
        nearScale = 0.72;
        farScale = 0.52;
        nearRotate = 14;
        farRotate = 22;
        centerScale = 1.05;
    }

    items.forEach((item, i) => {
        let rel = i - activeIndex;

        if (rel > items.length / 2) rel -= items.length;
        if (rel < -items.length / 2) rel += items.length;

        let transform = `translate(-50%, -50%) translate(0px, ${centerY}px) scale(0.45) rotateY(0deg)`;
        let opacity = 0;
        let zIndex = 1;

        if (rel === 0) {
            transform = `translate(-50%, -50%) translate(0px, ${centerY}px) scale(${centerScale}) rotateY(0deg)`;
            opacity = 1;
            zIndex = 10;
        } else if (rel === 1) {
            transform = `translate(-50%, -50%) translate(${nearOffset}px, ${centerY + 10}px) scale(${nearScale}) rotateY(-${nearRotate}deg)`;
            opacity = 0.68;
            zIndex = 8;
        } else if (rel === -1) {
            transform = `translate(-50%, -50%) translate(-${nearOffset}px, ${centerY + 10}px) scale(${nearScale}) rotateY(${nearRotate}deg)`;
            opacity = 0.68;
            zIndex = 8;
        } else if (rel === 2) {
            transform = `translate(-50%, -50%) translate(${farOffset}px, ${centerY + 22}px) scale(${farScale}) rotateY(-${farRotate}deg)`;
            opacity = 0.32;
            zIndex = 6;
        } else if (rel === -2) {
            transform = `translate(-50%, -50%) translate(-${farOffset}px, ${centerY + 22}px) scale(${farScale}) rotateY(${farRotate}deg)`;
            opacity = 0.32;
            zIndex = 6;
        }

        item.style.transform = transform;
        item.style.opacity = opacity;
        item.style.zIndex = zIndex;

        item.classList.remove('center-active');

        if (rel === 0) {
            item.classList.add('center-active');
        }
    });
}

function nextItem() {
    activeIndex = mod(activeIndex + 1, items.length);
    updateRevolver();
}

function prevItem() {
    activeIndex = mod(activeIndex - 1, items.length);
    updateRevolver();
}

nextBtn.addEventListener('click', nextItem);
prevBtn.addEventListener('click', prevItem);

items.forEach((item, i) => {
    item.addEventListener('click', () => {
        if (i === activeIndex) {
            if (item.dataset.type === 'cover' && item.dataset.link) {
                window.location.href = item.dataset.link;
            }
            return;
        }

        activeIndex = i;
        updateRevolver();
    });
});

window.addEventListener('resize', updateRevolver);
window.addEventListener('load', updateRevolver);
</script>

</body>
</html>
