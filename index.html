<style>
body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    overflow-x: hidden;
    animation: pageFade 1.2s ease;
}

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER ORIGINALE */
header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    padding-top: 10px;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO ORIGINALE */
.hero {
    margin-top: 180px;
    margin-bottom: 70px;
    animation: heroFade 1.8s ease;
}

@keyframes heroFade {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
    text-rendering: optimizeLegibility;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
    letter-spacing: 4px;
}

.hero p {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin: 6px 0 22px;
}

/* GOLD BUTTON ORIGINALE */
.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px 38px;
    text-decoration: none;
    display: inline-block;
    position: relative;
    overflow: hidden;
    background: linear-gradient(145deg, #bfa24a, #e6c86a, #caa94f, #a88935);
    color: #111;
    border: 1px solid #caa94f;
    border-radius: 2px;
    box-shadow:
        0 0 8px rgba(212,175,55,0.35),
        0 4px 10px rgba(0,0,0,0.5);
    transition: all 0.35s ease;
}

.buttons a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 4.5s infinite;
}

@keyframes shimmer {
    0% { left: -120%; }
    100% { left: 140%; }
}

.buttons a:hover {
    background: transparent;
    color: #d6b85a;
    border: 1px solid #8B0000;
    box-shadow:
        0 0 12px rgba(139,0,0,0.35),
        0 6px 14px rgba(0,0,0,0.6);
    transform: translateY(-1px);
}

/* REVOLVER */
.revolver-section {
    position: relative;
    width: 100%;
    padding: 10px 0 110px;
}

.revolver-stage {
    position: relative;
    width: 100%;
    height: 700px;
    overflow: hidden;
    perspective: 1400px;
}

.revolver-item {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transition:
        transform 0.5s ease,
        opacity 0.5s ease;
    user-select: none;
    cursor: pointer;
    text-align: center;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

.revolver-item img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.45);
    transition: transform 0.25s ease;
    image-rendering: auto;
    image-rendering: -webkit-optimize-contrast;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    filter: none;
}

.revolver-item.cover {
    width: 360px;
}

.revolver-item.poster {
    width: 360px;
}

.revolver-item.center-active:hover img {
    transform: translateZ(0) scale(1.015);
}

/* CAPTION DENTRO IL BLOCCO */
.item-caption {
    margin-top: 14px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
}

.revolver-item.center-active .item-caption {
    opacity: 1;
    transform: translateY(0);
}

.item-caption .title {
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 4px;
}

.item-caption .meta {
    font-size: 13px;
    letter-spacing: 2px;
    opacity: 0.65;
    line-height: 1.4;
}

/* CONTROLS AI LATI */
.revolver-btn {
    position: absolute;
    top: 34%;
    transform: translateY(-50%);
    background: rgba(17,17,17,0.65);
    border: 1px solid rgba(243,239,230,0.35);
    color: #F3EFE6;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    transition: opacity 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    opacity: 0.18;
    z-index: 20;
}

.revolver-section:hover .revolver-btn {
    opacity: 0.9;
}

.revolver-btn:hover {
    border-color: #F3EFE6;
    transform: translateY(-50%) scale(1.06);
}

.revolver-btn.prev {
    left: 40px;
}

.revolver-btn.next {
    right: 40px;
}

/* FOOTERS ORIGINALI */
.social-footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    margin-bottom: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    width: 100%;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */
@media (max-width: 768px) {
    header {
        font-size: 16px;
        gap: 20px;
        padding-top: 30px;
    }

    .hero {
        margin-top: 150px;
        margin-bottom: 40px;
    }

    .hero h1 {
        font-size: 60px;
    }

    .hero h2 {
        font-size: 20px;
    }

    .revolver-stage {
        height: 530px;
    }

    .revolver-item.cover,
    .revolver-item.poster {
        width: 250px;
    }

    .revolver-btn.prev {
        left: 14px;
    }

    .revolver-btn.next {
        right: 14px;
    }

    .item-caption .title {
        font-size: 20px;
    }
}

@media (max-width: 480px) {
    .hero h1 {
        font-size: 48px;
    }

    .hero h2 {
        font-size: 18px;
    }

    .buttons a {
        font-size: 16px;
        padding: 12px 28px;
    }

    .revolver-stage {
        height: 470px;
    }

    .revolver-item.cover,
    .revolver-item.poster {
        width: 220px;
    }

    .revolver-btn {
        width: 46px;
        height: 46px;
        font-size: 24px;
    }

    .item-caption .title {
        font-size: 18px;
    }

    .item-caption .meta {
        font-size: 12px;
    }
}

<script>
if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
}

window.addEventListener('load', () => {
    window.scrollTo(0, 0);
    updateRevolver();
});

const items = Array.from(document.querySelectorAll('.revolver-item'));
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

/* centro iniziale = lonely-heart_artcover.png */
let activeIndex = 2;

function mod(n, m) {
    return ((n % m) + m) % m;
}

function offsetFromActive(index) {
    const n = items.length;
    const right = mod(index - activeIndex, n);
    const left = mod(activeIndex - index, n);

    if (index === activeIndex) return 0;
    if (right <= left) return right;
    return -left;
}

function updateRevolver() {
    const isMobile = window.innerWidth <= 480;
    const isTablet = window.innerWidth <= 768;

    const centerY = -70;

    let pos1 = 255;
    let pos2 = 455;
    let scaleCenter = 1.22;
    let scale1 = 0.80;
    let scale2 = 0.60;
    let rot1 = 18;
    let rot2 = 30;
    let op1 = 0.70;
    let op2 = 0.28;

    if (isTablet) {
        pos1 = 180;
        pos2 = 320;
        scaleCenter = 1.14;
        scale1 = 0.74;
        scale2 = 0.54;
        rot1 = 15;
        rot2 = 24;
    }

    if (isMobile) {
        pos1 = 145;
        pos2 = 250;
        scaleCenter = 1.10;
        scale1 = 0.70;
        scale2 = 0.50;
        rot1 = 13;
        rot2 = 20;
    }

    items.forEach((item, i) => {
        const rel = offsetFromActive(i);

        let transform = `translate3d(-50%, -50%, 0) translate3d(0px, ${centerY}px, 0) scale(0.4) rotateY(0deg)`;
        let opacity = 0;
        let zIndex = 1;

        if (rel === 0) {
            transform = `translate3d(-50%, -50%, 0) translate3d(0px, ${centerY}px, 0) scale(${scaleCenter}) rotateY(0deg)`;
            opacity = 1;
            zIndex = 12;
        } else if (rel === 1) {
            transform = `translate3d(-50%, -50%, 0) translate3d(${pos1}px, ${centerY + 14}px, 0) scale(${scale1}) rotateY(-${rot1}deg)`;
            opacity = op1;
            zIndex = 9;
        } else if (rel === -1) {
            transform = `translate3d(-50%, -50%, 0) translate3d(-${pos1}px, ${centerY + 14}px, 0) scale(${scale1}) rotateY(${rot1}deg)`;
            opacity = op1;
            zIndex = 9;
        } else if (rel === 2 || rel === -2) {
            const dir = rel > 0 ? 1 : -1;
            transform = `translate3d(-50%, -50%, 0) translate3d(${dir * pos2}px, ${centerY + 28}px, 0) scale(${scale2}) rotateY(${dir > 0 ? -rot2 : rot2}deg)`;
            opacity = op2;
            zIndex = 6;
        }

        item.style.transform = transform;
        item.style.opacity = opacity;
        item.style.zIndex = zIndex;

        item.classList.remove('center-active');
        if (rel === 0) item.classList.add('center-active');
    });
}

function nextItem() {
    activeIndex = mod(activeIndex + 1, items.length);
    updateRevolver();
}

function prevItem() {
    activeIndex = mod(activeIndex - 1, items.length);
    updateRevolver();
}

prevBtn.addEventListener('click', prevItem);
nextBtn.addEventListener('click', nextItem);

items.forEach((item, i) => {
    item.addEventListener('click', () => {
        const rel = offsetFromActive(i);

        if (rel === 0) {
            if (item.dataset.link) {
                window.location.href = item.dataset.link;
            }
            return;
        }

        activeIndex = i;
        updateRevolver();
    });
});

window.addEventListener('resize', updateRevolver);
</script>
