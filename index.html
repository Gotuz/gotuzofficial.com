<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* FIX LINK BLU */
a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER ORIGINALE */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    letter-spacing: 2px;
    font-size: 20px;
    z-index: 1000;

    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* HERO ORIGINALE */

.hero {
    margin-top: 180px;
    margin-bottom: 100px;
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
    letter-spacing: 4px;
}

.hero p {
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 2px;
}

/* GOLD BUTTON ORIGINALE */

.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px 38px;
    display: inline-block;

    background: linear-gradient(145deg,#bfa24a,#e6c86a,#caa94f,#a88935);
    color: #111;
    border: 1px solid #caa94f;

    box-shadow:
        0 0 8px rgba(212,175,55,0.35),
        0 4px 10px rgba(0,0,0,0.5);

    transition: 0.3s;
}

.buttons a:hover {
    background: transparent;
    color: #d6b85a;
    border: 1px solid #8B0000;
}

/* 🎵 TRUE REVOLVER STYLE */

.carousel {
    display: flex;
    overflow-x: auto;
    gap: 80px;
    padding: 40px 60px 120px;

    scroll-snap-type: x mandatory;
}

.carousel::-webkit-scrollbar {
    display: none;
}

.item {
    flex: 0 0 auto;
    width: 300px;
    scroll-snap-align: center;

    transition: transform 0.3s;
}

/* effetto "focus" */

.item:hover {
    transform: scale(1.05);
}

/* POSTER GRANDE */

.poster {
    width: 100%;
    border-radius: 6px;
}

/* COVER PIÙ PICCOLA */

.cover {
    width: 75%;
    margin-top: 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.cover:hover {
    transform: scale(1.06);
    opacity: 0.85;
}

/* FOOTER ORIGINALE */

.social-footer {
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 30px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MOBILE */

@media (max-width:768px){

    .hero h1 { font-size: 60px; }
    .hero h2 { font-size: 20px; }

    .item { width: 220px; }
    .carousel { gap: 40px; padding: 20px; }
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<!-- HERO -->

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
<p>estimate date: end 2026</p>

<div class="buttons">
<a href="shop.html">PRE-ORDER</a>
</div>
</div>

<!-- 🎵 CAROUSEL -->

<div class="carousel">

<div class="item">
<img src="you-could-be_poster.png" class="poster">
<a href="listen.html">
<img src="you-could-be_artcover.png" class="cover">
</a>
</div>

<div class="item">
<img src="lonely-heart_poster.png" class="poster">
<a href="listen.html">
<img src="lonely-heart_artcover.png" class="cover">
</a>
</div>

</div>

<footer class="social-footer">
<a href="https://www.instagram.com/gotuzmusic"><img src="icons/instagram-bw.png"></a>
<a href="https://www.facebook.com/gotuzmusic"><img src="icons/facebook-bw.png"></a>
<a href="https://twitter.com/gotuzmusic"><img src="icons/twitter-bw.png"></a>
<a href="https://www.youtube.com/@gotuzmusic3389"><img src="icons/youtube-bw.png"></a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
<a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
