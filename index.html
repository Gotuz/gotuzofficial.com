<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

a {
    color: #F3EFE6;
    text-decoration: none;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

/* HERO */

.hero {
    margin-top: 180px;
    margin-bottom: 80px;
}

.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: 6px;
}

.hero h2 {
    font-size: 28px;
    margin: 15px 0;
    letter-spacing: 4px;
}

.hero p {
    font-size: 14px;
    opacity: 0.6;
}

/* BUTTON */

.buttons a {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    padding: 14px 38px;
    background: linear-gradient(145deg,#bfa24a,#e6c86a,#caa94f,#a88935);
    color: #111;
}

/* 🎯 TRUE COVERFLOW */

.coverflow {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;

    padding: 40px calc(50% - 160px);
    gap: 40px;
}

.coverflow::-webkit-scrollbar {
    display: none;
}

.item {
    flex: 0 0 auto;
    width: 320px;
    scroll-snap-align: center;
    transition: transform 0.4s;
}

/* POSTER */

.poster {
    width: 100%;
    border-radius: 6px;
}

/* COVER */

.cover {
    width: 70%;
    margin-top: 15px;
    border-radius: 6px;
}

/* FOOTER */

.social-footer {
    margin: 40px 0 10px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    opacity: 0.7;
}

.legal-footer {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 30px;
}

/* MOBILE */

@media (max-width:768px){
    .hero h1 { font-size: 60px; }
    .coverflow { padding: 20px calc(50% - 120px); }
    .item { width: 240px; }
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="hero">
<h1>GOTUZ</h1>
<h2>SECOND ALBUM</h2>
<p>estimate date: end 2026</p>

<div class="buttons">
<a href="shop.html">PRE-ORDER</a>
</div>
</div>

<!-- 🎵 COVERFLOW REALE -->

<div class="coverflow">

<div class="item">
<img src="you-could-be_poster.png" class="poster">
<img src="you-could-be_artcover.png" class="cover">
</div>

<div class="item">
<img src="lonely-heart_poster.png" class="poster">
<img src="lonely-heart_artcover.png" class="cover">
</div>

<div class="item">
<img src="you-could-be_poster.png" class="poster">
<img src="you-could-be_artcover.png" class="cover">
</div>

</div>

<footer class="social-footer">
<a href="#"><img src="icons/instagram-bw.png"></a>
<a href="#"><img src="icons/facebook-bw.png"></a>
<a href="#"><img src="icons/twitter-bw.png"></a>
<a href="#"><img src="icons/youtube-bw.png"></a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ | <a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
