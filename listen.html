<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

a { color: #F3EFE6; text-decoration: none; }

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

.section {
    margin-top: 150px;
    padding: 0 20px 80px;
}

.release {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-bottom: 110px;
    flex-wrap: wrap;

    opacity: 0;
    transform: translateY(30px);
    animation: reveal 1s ease forwards;
}

.release:nth-child(1) { animation-delay: 0.2s; }
.release:nth-child(2) { animation-delay: 0.4s; }
.release:nth-child(3) { animation-delay: 0.6s; }
.release:nth-child(4) { animation-delay: 0.8s; }
.release:nth-child(5) { animation-delay: 1s; }
.release:nth-child(6) { animation-delay: 1.2s; }

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.release img {
    width: 320px;
    border-radius: 6px;
    transition: 0.4s;
}

.release img:hover {
    transform: scale(1.04);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.release-info {
    text-align: left;
    max-width: 320px;
}

.release-title {
    font-size: 28px;
    margin-bottom: 8px;
}

.release-sub {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 22px;
}

.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.buttons button,
.buttons a {
    background: transparent;
    color: #F3EFE6;
    border: 1px solid #F3EFE6;
    padding: 10px 22px;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.25s;
}

.buttons button:hover,
.buttons a:hover {
    background: #F3EFE6;
    color: #111;
    transform: translateY(-2px);
}

/* MODAL */
.listen-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.listen-modal.active {
    display: flex;
}

.listen-box {
    width: 90%;
    max-width: 700px;
    background: #161616;
    padding: 30px;
}

.listen-close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 28px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

.platforms {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.platforms a {
    border: 1px solid #F3EFE6;
    padding: 8px 14px;
    font-size: 13px;
}

.platforms a:hover {
    background: #F3EFE6;
    color: #111;
}

.youtube iframe {
    width: 100%;
    height: 380px;
    border: none;
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="section">

<div class="buttons">
<button onclick="openModal(

'https://open.spotify.com/embed/album/3MTYAwHyoxg9CwWm9j1MxV',

'#',
'https://youtu.be/XhRkjo1w2VU'
)">LISTEN</button>

<a href="lonely-heart-poster.html">BUY</a>

</div>
</div>

<div class="release-info">

<div class="release-sub">Single · 2026</div>

<div class="buttons">
<button onclick="openModal(
'You Could Be',
'https://open.spotify.com/embed/album/6geLxX9AruhyGIon0d9uEg',
'https://open.spotify.com/album/6geLxX9AruhyGIon0d9uEg',
'https://gotuz.bandcamp.com/track/you-could-be',
'https://www.youtube.com/watch?v=GKgQN7vswhw'
)">LISTEN</button>

<a href="you-could-be-poster.html">BUY</a>

</div>

<!-- INVISIBLE HARP -->

</div>
</div>
</div>

<!-- WRONG WAY -->
<div class="release">
<img src="you-could-be_artcover.png">
<div class="release-info">
<div class="release-title">Wrong Way</div>
<div class="release-sub">Video · 2016</div>

<div class="buttons">
<a href="https://www.youtube.com/watch?v=h07ibFCIYkQ&list=RDh07ibFCIYkQ&start_radio=1" target="_blank">WATCH</a>
</div>
</div>

<!-- GLOW YELLOW -->
<div class="release">

</div>

<!-- MEMORY -->
<div class="release">
<div class="release-info" style="text-align:center; max-width:700px;">

<div class="release-sub">First Album · 2016</div>

<div class="youtube">
<iframe src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_k5vCl8Vq1KOUSpyfGoDJ5Kkd9mhy8Mf_w"></iframe>
</div>
</div>
</div>

</div>

<!-- MODAL -->
<div class="listen-modal" id="modal">
<div class="listen-box">
<button class="listen-close" onclick="closeModal()">×</button>

<h2 id="modalTitle"></h2>

<iframe id="spotifyEmbed" width="100%" height="152"></iframe>

<div class="platforms">
<a id="spotifyLink" target="_blank">Spotify</a>
<a id="bandcampLink" target="_blank">Bandcamp</a>
<a id="youtubeLink" target="_blank">YouTube</a>
</div>

</div>
</div>

<script>
function openModal(title, embed, spotify, bandcamp, youtube) {
document.getElementById('modalTitle').innerText = title;
document.getElementById('spotifyEmbed').src = embed;
document.getElementById('spotifyLink').href = spotify;
document.getElementById('bandcampLink').href = bandcamp;
document.getElementById('youtubeLink').href = youtube;
document.getElementById('modal').classList.add('active');
}

function closeModal() {
document.getElementById('modal').classList.remove('active');
document.getElementById('spotifyEmbed').src = '';
}
</script>

</body>
</html>
