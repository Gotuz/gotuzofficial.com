<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

/* BASE */

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

header a {
    color: #F3EFE6;
    text-decoration: none;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* SECTION */

.section {
    margin-top: 140px;
    padding: 0 20px;
}

/* RELEASE BLOCK */

.release {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-bottom: 100px;
    flex-wrap: wrap;
}

.release img {
    width: 320px;
    border-radius: 6px;
}

/* TEXT */

.release-info {
    text-align: left;
    max-width: 300px;
}

.release-title {
    font-size: 26px;
    margin-bottom: 10px;
}

.release-sub {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 20px;
}

/* BUTTONS */

.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.buttons a {
    text-decoration: none;
    padding: 10px 24px;
    border: 1px solid #F3EFE6;
    font-size: 14px;
    letter-spacing: 2px;
    transition: 0.2s;
}

.buttons a:hover {
    background: #F3EFE6;
    color: #111;
}

/* FIRST ALBUM */

.album-section {
    margin-top: 120px;
}

.album-title {
    font-size: 22px;
    margin-bottom: 30px;
    letter-spacing: 2px;
}

.youtube {
    max-width: 700px;
    margin: 0 auto;
}

.youtube iframe {
    width: 100%;
    height: 380px;
    border: none;
}

/* FOOTER */

.social-footer {
    margin-top: 80px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    opacity: 0.7;
}

.legal-footer {
    padding: 20px;
    font-size: 12px;
    opacity: 0.6;
}

/* MOBILE */

@media (max-width: 768px) {
    .release {
        flex-direction: column;
        gap: 30px;
    }

    .release img {
        width: 260px;
    }

    .release-info {
        text-align: center;
    }
}

</style>
</head>

<body>

<header>

</header>

<div class="buttons">

</div>

</div>
</div>

<!-- YOU COULD BE -->

<div class="release-info">

</div>

</div>

<!-- FIRST ALBUM -->

</div>

</div>

</div>

<footer class="social-footer">

<img src="icons/facebook-bw.png">
<img src="icons/twitter-bw.png">
<img src="icons/youtube-bw.png">
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
</footer>

</body>
</html>
