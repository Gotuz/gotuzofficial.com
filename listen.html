<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

header a {
    color: #F3EFE6;
    text-decoration: none;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

.section {
    margin-top: 150px;
    padding: 0 20px 80px;
}

.release {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-bottom: 110px;
    flex-wrap: wrap;
}

.release img {
    width: 320px;
    border-radius: 6px;
    transition: 0.4s;
}

.release img:hover {
    transform: scale(1.04);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.release-info {
    text-align: left;
    max-width: 320px;
}

.release-title {
    font-size: 28px;
    margin-bottom: 8px;
}

.release-sub {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 22px;
}

.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.buttons button,
.buttons a {
    background: transparent;
    color: #F3EFE6;
    border: 1px solid #F3EFE6;
    padding: 10px 22px;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.25s;
}

.buttons button:hover,
.buttons a:hover {
    background: #F3EFE6;
    color: #111;
}

/* VIDEO BLOCK */

.video-block {
    max-width: 720px;
    margin: 0 auto 120px;
}

.video-block iframe {
    width: 100%;
    height: 400px;
    border: none;
}

.video-info {
    margin-top: 20px;
}

.video-title {
    font-size: 26px;
    margin-bottom: 5px;
}

.video-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>

</header>

<a href="https://gotuz.bandcamp.com/track/lonely-heart" target="_blank">BUY</a>

</div>
</div>

</div>
</div>

</div>

<script>
function openModal(title, embed, spotify, bandcamp, youtube) {
document.getElementById('modalTitle').innerText = title;
document.getElementById('spotifyEmbed').src = embed;
document.getElementById('spotifyLink').href = spotify;
document.getElementById('bandcampLink').href = bandcamp;
document.getElementById('youtubeLink').href = youtube;
document.getElementById('modal').classList.add('active');
}

function closeModal() {
document.getElementById('modal').classList.remove('active');
document.getElementById('spotifyEmbed').src = '';
}
</script>

</body>
</html>
