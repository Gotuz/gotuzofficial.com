<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
    z-index: 100;
}

header a {
    color: #F3EFE6;
    text-decoration: none;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

.section {
    margin-top: 150px;
    padding: 0 20px 80px;
}

.release {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-bottom: 100px;
    flex-wrap: wrap;
}

.release img {
    width: 320px;
    border-radius: 6px;
    transition: 0.35s ease;
}

.release img:hover {
    transform: scale(1.04);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.release-info {
    max-width: 320px;
    text-align: left;
}

.release-info h2 {
    margin: 0 0 8px;
    font-size: 30px;
}

.release-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 18px;
    letter-spacing: 1px;
}

.buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.buttons a,
.buttons button {
    border: 1px solid rgba(243,239,230,0.85);
    padding: 10px 20px;
    background: transparent;
    color: #F3EFE6;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-decoration: none;
    transition: 0.25s ease;
}

.buttons a:hover,
.buttons button:hover {
    background: #F3EFE6;
    color: #111;
}

/* VIDEO BLOCK */

.video-block {
    max-width: 760px;
    margin: 0 auto 120px;
}

.video-block iframe {
    width: 100%;
    height: 400px;
    border: none;
    display: block;
}

.video-info {
    text-align: center;
    margin-top: 18px;
}

.video-info h2 {
    margin: 0 0 6px;
    font-size: 28px;
}

.video-info p {
    margin: 0 0 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    opacity: 0.7;
    letter-spacing: 1px;
}

.video-buttons {
    display: flex;
    justify-content: center;
    align-items: center;
}

.video-buttons a {
    border: 1px solid rgba(243,239,230,0.85);
    padding: 10px 20px;
    background: transparent;
    color: #F3EFE6;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-decoration: none;
    transition: 0.25s ease;
}

.video-buttons a:hover {
    background: #F3EFE6;
    color: #111;
}

/* APPLE STYLE MODAL */

.listen-modal {
    position: fixed;
    inset: 0;
    background: rgba(8, 8, 8, 0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.35s ease, visibility 0.35s ease;
    z-index: 9999;
}

.listen-modal.active {
    opacity: 1;
    visibility: visible;
}

.listen-box {
    position: relative;
    width: 100%;
    max-width: 720px;
    background: rgba(24, 24, 24, 0.88);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    padding: 30px 26px 26px;
    transform: scale(0.96) translateY(10px);
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
}

.listen-modal.active .listen-box {
    transform: scale(1) translateY(0);
    opacity: 1;
}

.listen-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: #F3EFE6;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s ease;
}

.listen-close:hover {
    background: rgba(255,255,255,0.12);
    transform: scale(1.05);
}

.listen-title {
    margin: 0 0 18px;
    font-size: 34px;
    letter-spacing: 1px;
}

.listen-embed {
    margin-bottom: 18px;
}

.listen-embed iframe {
    width: 100%;
    border: none;
    border-radius: 14px;
    overflow: hidden;
}

.listen-links {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.listen-links a {
    color: #F3EFE6;
    text-decoration: none;
    border: 1px solid rgba(243,239,230,0.75);
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    transition: 0.25s ease;
}

.listen-links a:hover {
    background: #F3EFE6;
    color: #111;
}

/* FOOTER */

.social-footer {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    padding: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

@media (max-width: 768px) {
    header {
        font-size: 16px;
        gap: 20px;
    }

    .release {
        gap: 30px;
    }

    .release img {
        width: 260px;
    }

    .release-info {
        text-align: center;
    }

    .buttons {
        justify-content: center;
    }

    .video-block iframe {
        height: 240px;
    }

    .listen-title {
        font-size: 26px;
    }
}
</style>
</head>

<script>
if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
}

window.addEventListener('load', function () {
    window.scrollTo(0, 0);
});

const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const spotifyEmbed = document.getElementById('spotifyEmbed');
const spotifyLink = document.getElementById('spotifyLink');
const bandcampLink = document.getElementById('bandcampLink');
const youtubeLink = document.getElementById('youtubeLink');

function openModal(title, embed, spotify, bandcamp, youtube) {
    modalTitle.innerText = title;
    spotifyEmbed.src = embed;
    spotifyLink.href = spotify;
    bandcampLink.href = bandcamp;
    youtubeLink.href = youtube;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    modal.classList.remove('active');
    spotifyEmbed.src = '';
    document.body.style.overflow = '';
}

function handleBackdrop(event) {
    if (event.target === modal) {
        closeModal();
    }
}

document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && modal.classList.contains('active')) {
        closeModal();
    }
});
</script>
