<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
}

/* HEADER */

header {
    position: absolute;
    top: 40px;
    width: 100%;
    font-size: 20px;
    letter-spacing: 2px;
    display: flex;
    justify-content: center;
    gap: 50px;
}

header a {
    color: #F3EFE6;
    text-decoration: none;
}

header a:hover {
    border-bottom: 1px solid #F3EFE6;
}

/* MAIN */

.section {
    margin-top: 150px;
    padding: 0 20px 80px;
}

.release {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-bottom: 100px;
    flex-wrap: wrap;
}

.release img {
    width: 320px;
    border-radius: 6px;
}

.release-info {
    max-width: 300px;
    text-align: left;
}

.buttons a,
.buttons button {
    border: 1px solid #F3EFE6;
    padding: 10px 20px;
    margin-right: 10px;
    background: none;
    color: #F3EFE6;
    cursor: pointer;
}

.buttons a:hover,
.buttons button:hover {
    background: #F3EFE6;
    color: #111;
}

/* VIDEO */

.video-block {
    max-width: 720px;
    margin: 0 auto 120px;
}

.video-block iframe {
    width: 100%;
    height: 400px;
    border: none;
}

.video-block h2 {
    margin: 20px 0 5px;
}

.video-block p {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    opacity: 0.7;
}

/* MODAL */

.listen-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

.listen-modal.active {
    display: flex;
}

.listen-box {
    background: #111;
    padding: 20px;
    max-width: 600px;
    width: 90%;
}

.listen-box h2 {
    margin-bottom: 15px;
}

.listen-box iframe {
    margin-bottom: 15px;
}

.listen-box .buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
}

/* FOOTER */

.social-footer {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-footer img {
    width: 25px;
    filter: grayscale(100%);
    opacity: 0.7;
    transition: 0.2s;
}

.social-footer img:hover {
    transform: scale(1.2);
    opacity: 1;
}

.legal-footer {
    padding: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
}

.legal-footer a {
    color: #F3EFE6;
    text-decoration: none;
    margin-left: 10px;
}

.legal-footer a:hover {
    border-bottom: 1px solid #F3EFE6;
}

</style>
</head>

<body>

<header>
<a href="index.html">HOME</a>
<a href="shows.html">SHOWS</a>
<a href="shop.html">SHOP</a>
<a href="listen.html">LISTEN</a>
<a href="news.html">NEWS</a>
</header>

<div class="section">

<!-- LONELY HEART -->
<div class="release">
<img src="lonely-heart_artcover.png">
<div class="release-info">
<h2>Lonely Heart</h2>

<div class="buttons">
<button onclick="openModal(
'Lonely Heart',
'https://open.spotify.com/embed/album/3MTYAwHyoxg9CwWm9j1MxV',
'https://open.spotify.com/album/3MTYAwHyoxg9CwWm9j1MxV',
'https://gotuz.bandcamp.com/track/lonely-heart',
'https://youtu.be/XhRkjo1w2VU'
)">LISTEN</button>

<a href="https://gotuz.bandcamp.com/track/lonely-heart" target="_blank">BUY</a>
</div>
</div>
</div>

<!-- YOU COULD BE -->
<div class="release">
<img src="you-could-be_artcover.png">
<div class="release-info">
<h2>You Could Be</h2>

<div class="buttons">
<button onclick="openModal(
'You Could Be',
'https://open.spotify.com/embed/album/6geLxX9AruhyGIon0d9uEg',
'https://open.spotify.com/album/6geLxX9AruhyGIon0d9uEg',
'https://gotuz.bandcamp.com/track/you-could-be',
'https://www.youtube.com/watch?v=GKgQN7vswhw'
)">LISTEN</button>

<a href="https://gotuz.bandcamp.com/track/you-could-be" target="_blank">BUY</a>
</div>
</div>
</div>

<!-- INVISIBLE HARP -->
<div class="video-block">
<iframe src="https://www.youtube.com/embed/9FoSzz6V4_Y"></iframe>
<h2>Invisible Harp</h2>
<p>My invention · 2019</p>
</div>

<!-- WRONG WAY -->
<div class="video-block">
<iframe src="https://www.youtube.com/embed/h07ibFCIYkQ"></iframe>
<h2>Wrong Way</h2>
<p>Single · 2016</p>

<div class="buttons">
<a href="https://gotuz.bandcamp.com/track/wrong-way" target="_blank">BUY</a>
</div>
</div>

<!-- MEMORY -->
<div class="video-block">
<iframe src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_k5vCl8Vq1KOUSpyfGoDJ5Kkd9mhy8Mf_w"></iframe>
<h2>Memory</h2>
<p>First Album · 2016</p>

<div class="buttons">
<a href="https://gotuz.bandcamp.com/album/memory" target="_blank">BUY</a>
</div>
</div>

<!-- GLOW YELLOW -->
<div class="video-block">
<iframe src="https://www.youtube.com/embed/TW-n_2nTi-A"></iframe>
<h2>Glow Yellow</h2>
<p>Single · 2016</p>

<div class="buttons">
<a href="https://gotuz.bandcamp.com/track/glow-yellow" target="_blank">BUY</a>
</div>
</div>

</div>

<!-- MODAL -->
<div class="listen-modal" id="modal">
<div class="listen-box">
<button onclick="closeModal()">X</button>

<h2 id="modalTitle"></h2>

<iframe id="spotifyEmbed" width="100%" height="152"></iframe>

<div class="buttons">
<a id="spotifyLink" target="_blank">Spotify</a>
<a id="bandcampLink" target="_blank">Bandcamp</a>
<a id="youtubeLink" target="_blank">YouTube</a>
</div>

</div>
</div>

<!-- FOOTER -->

<footer class="social-footer">
<a href="https://www.instagram.com/gotuzmusic" target="_blank">
<img src="icons/instagram-bw.png">
</a>
<a href="https://www.facebook.com/gotuzmusic" target="_blank">
<img src="icons/facebook-bw.png">
</a>
<a href="https://twitter.com/gotuzmusic" target="_blank">
<img src="icons/twitter-bw.png">
</a>
<a href="https://www.youtube.com/@gotuzmusic3389" target="_blank">
<img src="icons/youtube-bw.png">
</a>
</footer>

<footer class="legal-footer">
© 2026 GOTUZ
<a href="privacy.html">Privacy Policy</a>
</footer>

<script>
function openModal(title, embed, spotify, bandcamp, youtube) {
document.getElementById('modalTitle').innerText = title;
document.getElementById('spotifyEmbed').src = embed;
document.getElementById('spotifyLink').href = spotify;
document.getElementById('bandcampLink').href = bandcamp;
document.getElementById('youtubeLink').href = youtube;
document.getElementById('modal').classList.add('active');
}

function closeModal() {
document.getElementById('modal').classList.remove('active');
document.getElementById('spotifyEmbed').src = '';
}
</script>

</body>
</html>
