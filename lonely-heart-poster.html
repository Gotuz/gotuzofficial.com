<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lonely Heart Poster - GOTUZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #111;
    color: #F3EFE6;
    font-family: 'Cormorant Garamond', serif;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #222;
    z-index: 1000;
}

header a {
    color: #F3EFE6;
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 2px;
}

/* LAYOUT */
.product-container {
    margin-top: 100px;
    padding: 40px 20px 80px;
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
}

.product-images img {
    width: 420px;
    max-width: 100%;
    border-radius: 6px;
}

.description {
    max-width: 420px;
    font-size: 18px;
    line-height: 1.6;
}

.product-title {
    font-size: 32px;
    margin-bottom: 10px;
}

.product-subtitle {
    letter-spacing: 2px;
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 20px;
}

.product-price {
    font-size: 24px;
    margin-top: 25px;
}

/* BUTTON */
.buy-button {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 40px;
    border: 1px solid #F3EFE6;
    color: #F3EFE6;
    text-decoration: none;
    letter-spacing: 2px;
}

.buy-button:hover {
    background: #F3EFE6;
    color: #111;
}
</style>
</head>

<body>

<header>
<a href="shop.html">SHOP</a>
</header>

<div class="product-container">

    <div class="product-images">
        <img src="lonely-heart_poster.png" alt="Lonely Heart Poster">
    </div>

    <div class="description">
        <div class="product-title">Lonely Heart</div>
        <div class="product-subtitle">OFFICIAL POSTER</div>

        <p>Official release poster for <em>Lonely Heart</em>.</p>

        <p>30 × 30 cm premium print.</p>

        <div class="product-price">€10</div>

        <a class="buy-button" href="https://www.paypal.com/ncp/payment/XPVZ9HUSVJ566" target="_blank">
            BUY NOW
        </a>
    </div>

</div>

</body>
</html>
